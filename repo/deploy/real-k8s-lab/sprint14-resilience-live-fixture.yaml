apiVersion: v1
kind: Namespace
metadata:
  name: ani-sprint14-resilience
  labels:
    ani.dev/profile: sprint14-core-resilience
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sprint14-postgres-init
  namespace: ani-sprint14-resilience
data:
  001-reconcile-ha-live.sql: |
    CREATE TABLE IF NOT EXISTS workload_instances (
        tenant_id UUID NOT NULL,
        instance_id TEXT NOT NULL,
        name TEXT NOT NULL,
        workload_kind TEXT NOT NULL
            CHECK (workload_kind IN ('vm','container','gpu_container','inference','notebook','agent_sandbox','batch_job')),
        provider TEXT,
        audit_id UUID,
        provider_id TEXT,
        resource_refs JSONB NOT NULL DEFAULT '[]',
        state TEXT NOT NULL
            CHECK (state IN ('pending','provisioning','running','starting','stopping','stopped','failed','deleting','deleted')),
        endpoint TEXT,
        node_name TEXT,
        reason TEXT,
        networks JSONB NOT NULL DEFAULT '[]',
        storage JSONB NOT NULL DEFAULT '[]',
        lifecycle_policy JSONB NOT NULL DEFAULT '{}',
        ssh_connection JSONB NOT NULL DEFAULT '{}',
        snapshots JSONB NOT NULL DEFAULT '[]',
        container_status JSONB NOT NULL DEFAULT '{}',
        gpu_status JSONB NOT NULL DEFAULT '{}',
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        PRIMARY KEY (tenant_id, instance_id)
    );
    CREATE INDEX IF NOT EXISTS idx_workload_instances_reconcile
        ON workload_instances (state, updated_at);

    CREATE TABLE IF NOT EXISTS control_plane_leases (
        lease_name TEXT PRIMARY KEY,
        holder_id TEXT NOT NULL,
        lease_until TIMESTAMPTZ NOT NULL,
        updated_at TIMESTAMPTZ NOT NULL DEFAULT now()
    );
    CREATE INDEX IF NOT EXISTS idx_control_plane_leases_until
        ON control_plane_leases (lease_until);
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sprint14-postgres
  namespace: ani-sprint14-resilience
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sprint14-postgres
  template:
    metadata:
      labels:
        app: sprint14-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: ani
            - name: POSTGRES_USER
              value: ani
            - name: POSTGRES_PASSWORD
              value: ani_dev_password
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "ani"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: init-sql
          configMap:
            name: sprint14-postgres-init
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: sprint14-postgres
  namespace: ani-sprint14-resilience
spec:
  selector:
    app: sprint14-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sprint14-nats
  namespace: ani-sprint14-resilience
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sprint14-nats
  template:
    metadata:
      labels:
        app: sprint14-nats
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          imagePullPolicy: IfNotPresent
          args: ["-js"]
          ports:
            - containerPort: 4222
---
apiVersion: v1
kind: Service
metadata:
  name: sprint14-nats
  namespace: ani-sprint14-resilience
spec:
  selector:
    app: sprint14-nats
  ports:
    - name: nats
      port: 4222
      targetPort: 4222
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sprint14-redis
  namespace: ani-sprint14-resilience
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sprint14-redis
  template:
    metadata:
      labels:
        app: sprint14-redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          imagePullPolicy: IfNotPresent
          command: ["redis-server", "--requirepass", "ani_dev_password"]
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: sprint14-redis
  namespace: ani-sprint14-resilience
spec:
  selector:
    app: sprint14-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sprint14-minio
  namespace: ani-sprint14-resilience
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sprint14-minio
  template:
    metadata:
      labels:
        app: sprint14-minio
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2025-04-22T22-12-26Z
          imagePullPolicy: IfNotPresent
          args: ["server", "/data", "--address", ":9000", "--console-address", ":9001"]
          ports:
            - name: s3
              containerPort: 9000
            - name: console
              containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              value: minio
            - name: MINIO_ROOT_PASSWORD
              value: ani_dev_password
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: s3
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: sprint14-minio
  namespace: ani-sprint14-resilience
spec:
  selector:
    app: sprint14-minio
  ports:
    - name: s3
      port: 9000
      targetPort: s3
    - name: console
      port: 9001
      targetPort: console
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sprint14-worker-a
  namespace: ani-sprint14-resilience
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ani-reconcile-worker
      ani.kubercloud.io/reconcile-identity: worker-a
  template:
    metadata:
      labels:
        app: ani-reconcile-worker
        ani.kubercloud.io/reconcile-identity: worker-a
    spec:
      containers:
        - name: worker
          image: registry.k8s.io/pause:3.10
          imagePullPolicy: IfNotPresent
          command: ["/opt/ani/bin/reconcile-worker"]
          ports:
            - containerPort: 9205
          env:
            - name: DATABASE_URL
              value: postgres://ani:ani_dev_password@sprint14-postgres.ani-sprint14-resilience.svc.cluster.local:5432/ani?sslmode=disable
            - name: NATS_URL
              value: nats://sprint14-nats.ani-sprint14-resilience.svc.cluster.local:4222
            - name: REDIS_URL
              value: redis://:ani_dev_password@sprint14-redis.ani-sprint14-resilience.svc.cluster.local:6379/0
            - name: HEALTH_PORT
              value: "9205"
            - name: OBJECT_STORE_PROVIDER
              value: minio
            - name: OBJECT_STORE_ENDPOINT
              value: http://sprint14-minio.ani-sprint14-resilience.svc.cluster.local:9000
            - name: OBJECT_STORE_PUBLIC_ENDPOINT
              value: http://sprint14-minio.ani-sprint14-resilience.svc.cluster.local:9000
            - name: OBJECT_STORE_ACCESS_KEY_ID
              value: minio
            - name: OBJECT_STORE_SECRET_ACCESS_KEY
              value: ani_dev_password
            - name: OBJECT_STORE_REGION
              value: us-east-1
            - name: OBJECT_STORE_SECURE
              value: "false"
            - name: WORKLOAD_RECONCILE_CONTROLLER_ENABLED
              value: "true"
            - name: WORKLOAD_RECONCILE_LEADER_ELECTION_ENABLED
              value: "true"
            - name: WORKLOAD_RECONCILE_LEADER_IDENTITY
              value: worker-a
            - name: WORKLOAD_RECONCILE_LEADER_LEASE_NAME
              value: sprint14-workload-reconcile-controller
            - name: WORKLOAD_RECONCILE_LEADER_LEASE_TTL_SECONDS
              value: "12"
            - name: WORKLOAD_RECONCILE_LEADER_RENEW_INTERVAL_SECONDS
              value: "3"
            - name: WORKLOAD_RECONCILE_NORMAL_INTERVAL_SECONDS
              value: "5"
          volumeMounts:
            - name: worker-bin
              mountPath: /opt/ani/bin/reconcile-worker
      volumes:
        - name: worker-bin
          hostPath:
            path: /opt/ani/reconcile-worker/reconcile-worker
            type: File
---
