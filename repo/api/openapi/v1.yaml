      required: [event_type, description, enabled, updated_at]
      properties:
        event_type:
          type: string
          enum:
            - platform_alert_p0
            - platform_alert_p1
            - incident_created
            - incident_escalated
            - platform_task_failed
        description: { type: string }
        enabled:    { type: boolean }
        updated_at: { type: string, format: date-time }

    EmailSubscriptionListResponse:
      type: object
      description: "订阅列表（首期固定 5 行）"
      required: [items, total]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/EmailSubscription' } }
        total: { type: integer }

    PutEmailSubscriptionsRequest:
      type: object
      description: "批量保存邮件事件订阅"
      required: [subscriptions]
      properties:
        subscriptions:
          type: array
          minItems: 1
          items:
            type: object
            required: [event_type, enabled]
            properties:
              event_type:
                type: string
                enum:
                  - platform_alert_p0
                  - platform_alert_p1
                  - incident_created
                  - incident_escalated
                  - platform_task_failed
              enabled: { type: boolean }
      additionalProperties: false

    SendTestEmailResponse:
      type: object
      description: "测试发送结果"
      required: [success, message, request_id]
      properties:
        success:    { type: boolean }
        message:    { type: string, description: "成功或失败的可读信息" }
        request_id: { type: string, description: "请求 ID（用于排障）" }
        sent_at:    { type: string, format: date-time, nullable: true }

  # 公共响应
  responses:
    Unauthorized:
      description: 未认证或 Token 无效（code=UNAUTHORIZED）
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: 无权访问该资源（code=FORBIDDEN）
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: 资源不存在（code=NOT_FOUND）
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NetworkSecurityGroupRuleNotFound:
      description: 安全组不存在，或 rule_id 不属于该 security_group_id（code=NOT_FOUND）
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    BadRequest:
      description: 请求参数不合法（code=BAD_REQUEST）
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: 资源已存在或冲突（code=CONFLICT）
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    RateLimitExceeded:
      description: 超出速率限制（code=RATE_LIMIT_EXCEEDED）
      headers:
        Retry-After:
          schema: { type: integer }
          description: "建议等待的秒数"
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    PreconditionFailed:
      description: 前置条件不满足（code=PRECONDITION_FAILED）
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

security:
  - BearerAuth: []
  - ApiKeyAuth: []

# ── API 路径定义 ──────────────────────────────────────────────────────────────
# 说明：/demo/* 路径已迁移至 api/openapi/dev.yaml（不参与 SDK 生成）
paths:

  # ── 健康检查（K8s probe 必须）──────────────────────────────────────────────
  /healthz:
    get:
      operationId: liveness
      summary: Liveness probe（进程存活检查）
      description: |
        K8s liveness probe 端点。只要进程能响应即返回 200。
        不检查依赖（Postgres/NATS/Redis），仅表示"进程在运行"。
        不需要认证。
      tags: [Health]
      security: []
      responses:
        "200":
          description: 进程存活
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:   { type: string, enum: [ok], example: "ok" }
                  version:  { type: string, example: "v0.8.0" }
                  build_at: { type: string, format: date-time }
        "503":
          description: 进程异常（极少见，进程若能响应通常返回200）
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /readyz:
    get:
      operationId: readiness
      summary: Readiness probe（服务就绪检查）
      description: |
        K8s readiness probe 端点。检查所有关键依赖是否可用。
        任一依赖不可用则返回 503，此时 K8s 从 LB 摘除该实例。
        不需要认证。
      tags: [Health]
      security: []
      responses:
        "200":
          description: 服务就绪，可接受流量
          content:
            application/json:
              schema:
                type: object
                required: [status, checks]
                properties:
                  status: { type: string, enum: [ok, degraded] }
                  checks:
                    type: object
                    description: 各依赖的健康状态
                    additionalProperties:
                      type: object
                      properties:
                        status:  { type: string, enum: [ok, fail] }
                        latency_ms: { type: integer }
                        error:   { type: string, nullable: true }
                    example:
                      postgres:  { status: ok, latency_ms: 3 }
                      nats:      { status: ok, latency_ms: 1 }
                      redis:     { status: ok, latency_ms: 1 }
        "503":
          description: 服务未就绪（至少一个依赖不可用）
          content:
            application/json:
              schema:
                type: object
                required: [status, checks]
                properties:
                  status: { type: string, enum: [degraded, error] }
                  checks: { type: object, additionalProperties: true }

  # ── 认证 ────────────────────────────────────────────────────────────────────
  /auth/password/login:
    post:
      operationId: passwordLogin
