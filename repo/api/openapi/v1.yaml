  # ── 平台品牌化 ──────────────────────────────────────────────────────────────
  /branding:
    get:
      summary: 获取平台品牌配置
      tags: [Branding]
      security: []     # 无需认证，首屏加载需要
      responses:
        "200":
          description: 品牌配置
          content:
            application/json:
              schema:
                type: object
                properties:
                  platform_name:  { type: string }
                  logo_light_url: { type: string, format: uri }
                  logo_dark_url:  { type: string, format: uri }
                  favicon_url:    { type: string, format: uri }
                  primary_color:  { type: string, example: "#1677FF" }
                  secondary_color: { type: string }
                  icp_number:     { type: string }

  # ── 实例操作历史（Control Plane 操作追踪）──────────────────────────────────
  /instances/{instance_id}/operations:
    get:
      operationId: listInstanceOperations
      summary: 查询实例操作历史
      description: |
        返回指定实例的所有操作记录（创建、启动、停止、变配、删除等）。
        每条操作记录包含：操作类型、状态、触发用户、时间线步骤、失败原因和重试建议。
      tags: [Instances]
      x-ani-rbac-scope: "scope:instances:read"
      parameters:
        - { name: instance_id, in: path,  required: true, schema: { type: string } }
        - { name: limit,       in: query, schema: { type: integer, default: 20, minimum: 1, maximum: 100 } }
        - { name: cursor,      in: query, schema: { type: string } }
      responses:
        "200":
          description: 操作历史列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CursorPage'
                  - properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/InstanceOperation' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }

  /instance-operations/{operation_id}:
    get:
      operationId: getInstanceOperation
      summary: 查询单个操作详情
      description: 通过 operation_id 查询操作详情，包含完整时间线步骤。
      tags: [Instances]
      x-ani-rbac-scope: "scope:instances:read"
      parameters:
        - { name: operation_id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: 操作详情
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InstanceOperation' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }

  # ── 异步任务 ────────────────────────────────────────────────────────────────
  /tasks/{task_id}:
    get:
      summary: 查询异步任务状态
      tags: [Tasks]
      parameters:
        - { name: task_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: 异步任务状态
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AsyncTask' }
        "404":
          $ref: '#/components/responses/NotFound'

  # ── 可观测性 ────────────────────────────────────────────────────────────────
  /observability/query:
    get:
      operationId: queryObservability
      summary: PromQL 代理查询
      description: 通过 Core 代理 PromQL 查询，不暴露底层 Prometheus 地址。
      tags: [Observability]
      x-ani-rbac-scope: "scope:observability:read"
      parameters:
        - { name: query, in: query, required: true, schema: { type: string, minLength: 1 } }
        - { name: time, in: query, required: false, schema: { type: string, format: date-time } }
        - { name: timeout, in: query, required: false, schema: { type: string, default: 30s } }
      responses:
        "200":
          description: PromQL 查询结果
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ObservabilityQueryResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }

  /observability/query_range:
    get:
      operationId: queryRangeObservability
      summary: PromQL 代理区间查询
      description: 通过 Core 代理 PromQL 区间查询（range query），返回时间区间内多个采样点，用于绘制时序曲线。不暴露底层 Prometheus 地址。
      tags: [Observability]
      x-ani-rbac-scope: "scope:observability:read"
      parameters:
        - { name: query, in: query, required: true, schema: { type: string, minLength: 1 } }
        - { name: start, in: query, required: true, schema: { type: string, format: date-time } }
        - { name: end, in: query, required: true, schema: { type: string, format: date-time } }
        - { name: step, in: query, required: true, schema: { type: string, description: "采样步长，如 15s / 30s / 1m" } }
        - { name: timeout, in: query, required: false, schema: { type: string, default: 30s } }
      responses:
        "200":
          description: PromQL 区间查询结果（matrix）
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ObservabilityRangeQueryResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }

  /observability/alert-rules:
    get:
      operationId: listObservabilityAlertRules
      summary: 列出告警规则
      tags: [Observability]
      x-ani-rbac-scope: "scope:observability:read"
      parameters:
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100 } }
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        "200":
          description: 告警规则列表
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ObservabilityAlertRuleListResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
    post:
      operationId: createObservabilityAlertRule
      summary: 创建告警规则
      tags: [Observability]
      x-ani-rbac-scope: "scope:observability:write"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateObservabilityAlertRuleRequest' }
      responses:
        "201":
          description: 告警规则已创建
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ObservabilityAlertRule' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }

  /observability/alert-rules/{rule_id}:
    get:
      operationId: getObservabilityAlertRule
      summary: 获取告警规则
      tags: [Observability]
      x-ani-rbac-scope: "scope:observability:read"
      parameters:
        - { name: rule_id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: 告警规则详情
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ObservabilityAlertRule' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: updateObservabilityAlertRule
      summary: 更新告警规则
      tags: [Observability]
      x-ani-rbac-scope: "scope:observability:write"
      parameters:
        - { name: rule_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateObservabilityAlertRuleRequest' }
      responses:
        "200":
          description: 告警规则已更新
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ObservabilityAlertRule' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: deleteObservabilityAlertRule
      summary: 删除告警规则
      tags: [Observability]
      x-ani-rbac-scope: "scope:observability:write"
      parameters:
        - { name: rule_id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: 告警规则已删除
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ObservabilityAlertRule' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }

  # ── 计量 ────────────────────────────────────────────────────────────────────
  /metering/usage:
    get:
      operationId: getMeteringUsage
      x-ani-rbac-scope: "scope:metering:read"
      summary: 查询租户用量统计
      description: |
        在租户 JWT 上下文中查询本租户的用量数据。
        tenant_id 从 JWT 提取，忽略 query 中的 tenant_id 参数。
      tags: [Metering]
      parameters:
        - { name: start_time, in: query, required: true, schema: { type: string, format: date-time } }
        - { name: end_time,   in: query, required: true, schema: { type: string, format: date-time } }
        - { name: resource_type, in: query, schema: { type: string } }
        - { name: group_by, in: query, schema: { type: string, enum: [resource_type, az, day, hour] } }
      responses:
        "200":
          description: 租户用量统计
          content:
            application/json:
              schema:
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        resource_type: { type: string }
                        total_quantity: { type: number }
                        unit:           { type: string }
                        period:         { type: string }
                  total: { type: integer }
                  dev_profile:
                    $ref: '#/components/schemas/CoreDevProfileInfo'
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }

  /metering/usage/platform:
    get:
      operationId: getPlatformMeteringUsage
      x-ani-rbac-scope: "scope:metering:platform:read"
      summary: 查询平台跨租户用量
      description: |
        在平台 RBAC 上下文中查询全平台或指定租户的用量数据。
        需 scope:metering:platform:read 权限。
        items[].tenant_id 在此端点下必填。
        若带 tenant_id query 须二次 RBAC 校验。
      tags: [Metering]
      parameters:
        - { name: start_time, in: query, required: true, schema: { type: string, format: date-time } }
        - { name: end_time,   in: query, required: true, schema: { type: string, format: date-time } }
        - { name: resource_type, in: query, schema: { type: string } }
        - { name: group_by, in: query, schema: { type: string, enum: [tenant_id, day, hour] } }
        - { name: tenant_id, in: query, required: false, schema: { type: string }, description: "可选筛选单租户，须平台 RBAC 校验" }
      responses:
        "200":
          description: 平台用量查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeteringUsageResponse'
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }

  /metering/token-usage:
    post:
      operationId: reportTokenUsage
      summary: 上报 Token 用量
      description: Services 层通过 Core API 上报 Token 计量事件；客户端重试必须复用同一个 idempotency_key。
      tags: [Metering]
      x-ani-rbac-scope: "scope:metering:write"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReportTokenUsageRequest' }
      responses:
        "202":
          description: Token 用量事件已接受
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenUsageReport' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }

