        - { name: repository, in: query, schema: { type: string } }
        - { name: tag, in: query, schema: { type: string } }
        - { name: purpose, in: query, schema: { type: string, enum: [container, gpu, sandbox, system] } }
        - { name: scan_status, in: query, schema: { type: string, enum: [not_scanned, pending, running, complete, failed] } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100 } }
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        "200":
          description: 镜像 Tag 列表
