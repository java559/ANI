                $ref: "#/components/schemas/EncryptionKeyListResponse"
    post:
      operationId: createEncryptionKey
      summary: 创建加密密钥
      tags: [Encryption]
      x-ani-rbac-scope: "scope:encryption:create"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EncryptionKeyCreateRequest"
      responses:
        "201":
          description: 加密密钥创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EncryptionKey"

  /encryption/keys/{key_id}:
    get:
      operationId: getEncryptionKey
      summary: 查询加密密钥
      tags: [Encryption]
      x-ani-rbac-scope: "scope:encryption:read"
      parameters:
        - { name: key_id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: 加密密钥详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EncryptionKey"
    delete:
      operationId: deleteEncryptionKey
      summary: 删除加密密钥
      tags: [Encryption]
      x-ani-rbac-scope: "scope:encryption:delete"
      parameters:
        - { name: key_id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: 加密密钥删除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EncryptionKey"

  /encryption/keys/{key_id}/rotate:
    post:
      operationId: rotateEncryptionKey
      summary: 轮换加密密钥
      description: Sprint 5 local dev profile 返回新 active key，并将旧 key 标记为 rotated；真实 SM4/KMS provider 接入后必须保持响应语义兼容。
      tags: [Encryption]
      x-ani-rbac-scope: "scope:encryption:manage"
      parameters:
        - { name: key_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EncryptionKeyRotateRequest"
      responses:
        "200":
          description: 加密密钥轮换结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EncryptionKeyRotationResponse"
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          $ref: '#/components/responses/Conflict'

  /encryption/keys/{key_id}/revoke:
    post:
      operationId: revokeEncryptionKey
      summary: 吊销加密密钥
      description: Sprint 5 local dev profile 将 key 标记为 revoked；revoked key 不再允许 seal 或生成 unseal token。
      tags: [Encryption]
      x-ani-rbac-scope: "scope:encryption:manage"
      parameters:
        - { name: key_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EncryptionKeyRevokeRequest"
      responses:
        "200":
          description: 加密密钥吊销成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EncryptionKey"
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          $ref: '#/components/responses/Conflict'

  /encryption/seal:
    post:
      operationId: sealEncryptionObject
      summary: 加密对象路径并生成解封令牌
      description: Sprint 5 local dev profile 返回模拟 sealed object URI 和 unseal token；真实 SM4/KMS provider 接入后必须保持响应语义兼容。
      tags: [Encryption]
      x-ani-rbac-scope: "scope:encryption:use"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EncryptionSealRequest"
      responses:
        "200":
          description: 加密对象并生成解封令牌成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EncryptionSealResponse"
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          $ref: '#/components/responses/Conflict'

  /encryption/unseal-token:
    post:
      operationId: createEncryptionUnsealToken
      summary: 生成对象解封令牌
      description: 为 Init Container 或后续模型加载流程生成限时解封令牌；当前为 local dev profile 模拟令牌。
      tags: [Encryption]
      x-ani-rbac-scope: "scope:encryption:use"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EncryptionUnsealTokenRequest"
      responses:
        "200":
          description: 对象解封令牌创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EncryptionUnsealTokenResponse"
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          $ref: '#/components/responses/Conflict'

  /secrets:
    get:
      operationId: listSecrets
      summary: 列出 Secret
      description: 只返回 Secret 元数据和 key 名称，不返回明文值。
      tags: [Secrets]
      x-ani-rbac-scope: "scope:secrets:read"
      parameters:
        - { name: limit,  in: query, schema: { type: integer, minimum: 1, maximum: 100 } }
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        "200":
          description: Secret 元数据列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretListResponse"
    post:
      operationId: createSecret
      summary: 创建 Secret
      description: Sprint 5 local dev profile 存储 Secret 明文仅限本地 adapter；API 响应只返回元数据和 key 名称。
      tags: [Secrets]
      x-ani-rbac-scope: "scope:secrets:create"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecretCreateRequest"
      responses:
        "201":
          description: Secret 创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Secret"

  /secrets/{secret_id}:
    get:
      operationId: getSecret
      summary: 查询 Secret 元数据
      tags: [Secrets]
      x-ani-rbac-scope: "scope:secrets:read"
      parameters:
        - { name: secret_id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Secret 元数据详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Secret"
        "404":
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteSecret
      summary: 删除 Secret
      tags: [Secrets]
      x-ani-rbac-scope: "scope:secrets:delete"
      parameters:
        - { name: secret_id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Secret 删除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Secret"
        "404":
          $ref: '#/components/responses/NotFound'

  /secrets/{secret_id}/bindings:
    post:
      operationId: bindSecret
      summary: 绑定 Secret 到工作负载
      description: 当前为 local dev profile 绑定记录；真实 K8s Secret 注入在 provider/controller 边界实现。
      tags: [Secrets]
      x-ani-rbac-scope: "scope:secrets:bind"
      parameters:
        - { name: secret_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecretBindingRequest"
      responses:
        "201":
          description: Secret 绑定创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretBinding"
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          $ref: '#/components/responses/Conflict'

  # ── GPU 设备清单（Core API Alpha）────────────────────────────────────────────
  /gpu-inventory:
    get:
      operationId: listGPUInventory
      summary: 查询 GPU 设备清单
      description: 返回平台所有 GPU 卡的清单视图，含型号、状态、租户分配情况。
      tags: [GPUInventory]
      x-ani-rbac-scope: "scope:gpu-inventory:read"
      parameters:
        - { name: gpu_type,  in: query, schema: { type: string } }
        - { name: status,    in: query, schema: { type: string, enum: [available, in_use, fault, maintenance] } }
        - { name: node_name, in: query, schema: { type: string } }
        - { name: limit,  in: query, schema: { type: integer, default: 50, minimum: 1, maximum: 200 } }
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        "200":
          description: GPU 设备清单
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GPUInventoryListResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }

  /gpu-inventory/occupancy:
    get:
      operationId: getGPUOccupancy
      summary: 查询 GPU 占用分布统计
      tags: [GPUInventory]
      x-ani-rbac-scope: "scope:gpu-inventory:read"
      responses:
        "200":
          description: GPU 占用分布
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GPUOccupancyStats' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }

  # ── GPU 调度队列（Core API Alpha）─────────────────────────────────────────────
  /gpu-scheduling/queues:
    get:
      operationId: listGPUSchedulingQueues
      summary: 查询 GPU 调度队列列表
      description: 返回当前租户可见的 GPU 调度队列，含平台默认队列和租户自定义队列。
      tags: [GPUScheduling]
      x-ani-rbac-scope: "scope:gpu-scheduling:read"
      responses:
        "200":
          description: 队列列表
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GPUSchedulingQueueListResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
    post:
      operationId: createGPUSchedulingQueue
      summary: 创建 GPU 调度队列
      description: 创建租户自定义调度队列，映射为 Volcano Queue CRD。平台默认队列不可通过此接口创建。
      tags: [GPUScheduling]
      x-ani-rbac-scope: "scope:gpu-scheduling:write"
      parameters:
        - { name: Idempotency-Key, in: header, required: true, schema: { type: string, format: uuid }, description: "幂等键，防止重复创建" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GPUSchedulingQueueCreateRequest' }
      responses:
        "201":
          description: 队列创建成功
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GPUSchedulingQueue' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409":
          $ref: '#/components/responses/Conflict'
          description: "队列名称冲突，code: QueueNameConflict"

  /gpu-scheduling/queues/{queue_id}:
    get:
      operationId: getGPUSchedulingQueue
      summary: 查询单个 GPU 调度队列
      tags: [GPUScheduling]
      x-ani-rbac-scope: "scope:gpu-scheduling:read"
      parameters:
        - { name: queue_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: 队列详情
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GPUSchedulingQueue' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: updateGPUSchedulingQueue
      summary: 更新 GPU 调度队列
      description: 更新租户自定义队列的权重、可回收性等属性。平台默认队列不可修改。
      tags: [GPUScheduling]
      x-ani-rbac-scope: "scope:gpu-scheduling:write"
      parameters:
        - { name: queue_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GPUSchedulingQueueUpdateRequest' }
      responses:
        "200":
          description: 队列更新成功
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GPUSchedulingQueue' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403":
          $ref: '#/components/responses/Forbidden'
          description: "平台默认队列不可修改，code: PlatformDefaultProtected"
        "404": { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: deleteGPUSchedulingQueue
      summary: 删除 GPU 调度队列
      description: 删除租户自定义队列。平台默认队列不可删除。
      tags: [GPUScheduling]
      x-ani-rbac-scope: "scope:gpu-scheduling:write"
      parameters:
        - { name: queue_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204":
          description: 队列删除成功
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403":
          $ref: '#/components/responses/Forbidden'
          description: "平台默认队列不可删除，code: PlatformDefaultProtected"
        "404": { $ref: '#/components/responses/NotFound' }

  # ── Sandbox 模板（Core API Alpha）────────────────────────────────────────────
  /sandbox-templates:
    get:
      operationId: listSandboxTemplates
      summary: 查询 Sandbox 模板列表
      tags: [Instances]
      x-ani-rbac-scope: "scope:instances:read"
      parameters:
        - { name: limit,  in: query, schema: { type: integer, default: 20, minimum: 1, maximum: 100 } }
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        "200":
          description: Sandbox 模板列表
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SandboxTemplateListResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }

  # ── 邮件通知（BOSS 平台级 SMTP 发信通道、收件人、事件订阅、测试发送）──────────────
  /notifications/email/smtp:
    get:
      operationId: getEmailSmtpConfig
      summary: 获取邮件 SMTP 发信通道配置
      description: |
        返回平台级 SMTP 发信通道配置。
        - configured=false 表示尚未配置（空态），其他字段可省略。
        - configured=true 时返回完整字段；password / auth_code 明文永不回显，
          仅返回 has_password / has_auth_code 布尔位。
      tags: [Notifications]
      x-ani-rbac-scope: "scope:notifications:read"
      responses:
        "200":
          description: SMTP 配置（可能为空态）
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EmailSmtpConfigResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
    put:
      operationId: putEmailSmtpConfig
      summary: 保存邮件 SMTP 发信通道配置
      description: |
        保存平台级 SMTP 发信通道配置。
        password 与 auth_code 独立保存、独立清除，服务端不强制二选一：
        - 省略或 null：不修改已有值
        - 空字符串 ""：清除已有值
        - 非空字符串：加密后覆盖
        发送邮件时若 auth_code 已设置则优先使用 auth_code，否则使用 password。
      tags: [Notifications]
      x-ani-rbac-scope: "scope:notifications:write"
      parameters:
        - { name: Idempotency-Key, in: header, required: true, schema: { type: string, format: uuid }, description: "幂等键" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PutEmailSmtpConfigRequest' }
      responses:
        "200":
          description: 配置已保存
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EmailSmtpConfigResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }

  /notifications/email/recipients:
    get:
      operationId: listEmailRecipients
      summary: 列出邮件收件人
      description: 返回平台级全局收件人列表；所有已开启订阅的事件共用此列表。
      tags: [Notifications]
      x-ani-rbac-scope: "scope:notifications:read"
      responses:
        "200":
          description: 收件人列表
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EmailRecipientListResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
    post:
      operationId: createEmailRecipient
      summary: 新增收件人
      tags: [Notifications]
      x-ani-rbac-scope: "scope:notifications:write"
      parameters:
        - { name: Idempotency-Key, in: header, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateEmailRecipientRequest' }
      responses:
        "201":
          description: 收件人已创建
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EmailRecipient' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { $ref: '#/components/responses/Conflict' }

  /notifications/email/recipients/{recipient_id}:
    patch:
      operationId: updateEmailRecipient
      summary: 更新收件人（邮箱地址、备注、启停）
      tags: [Notifications]
      x-ani-rbac-scope: "scope:notifications:write"
      parameters:
        - { name: recipient_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: Idempotency-Key, in: header, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateEmailRecipientRequest' }
      responses:
        "200":
          description: 收件人已更新
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EmailRecipient' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: deleteEmailRecipient
      summary: 删除收件人
      tags: [Notifications]
      x-ani-rbac-scope: "scope:notifications:write"
      parameters:
        - { name: recipient_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: Idempotency-Key, in: header, required: true, schema: { type: string, format: uuid } }
      responses:
        "204":
          description: 收件人已删除
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }

  /notifications/email/subscriptions:
    get:
      operationId: listEmailSubscriptions
      summary: 列出邮件事件订阅
      description: 返回首期冻结的 5 个事件订阅开关状态。
      tags: [Notifications]
      x-ani-rbac-scope: "scope:notifications:read"
      responses:
        "200":
          description: 订阅列表（固定 5 行）
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EmailSubscriptionListResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
    put:
      operationId: putEmailSubscriptions
      summary: 批量保存邮件事件订阅
      description: 批量更新事件订阅开关；非行内 PATCH，整体提交。
      tags: [Notifications]
      x-ani-rbac-scope: "scope:notifications:write"
      parameters:
        - { name: Idempotency-Key, in: header, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PutEmailSubscriptionsRequest' }
      responses:
        "200":
          description: 订阅已保存
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EmailSubscriptionListResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }

  /notifications/email/test:
    post:
      operationId: sendTestEmail
      summary: 发送测试邮件
      description: |
        向所有启用的收件人发送一封测试邮件，验证 SMTP 通道与收件人可用性。
        前置条件：
        - SMTP 通道已配置（configured=true）
        - 至少一个启用中的收件人（enabled=true）
        - password 或 auth_code 至少设置一个
        不满足任一前置条件返回 422 PRECONDITION_FAILED。
      tags: [Notifications]
      x-ani-rbac-scope: "scope:notifications:write"
      parameters:
        - { name: Idempotency-Key, in: header, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: 测试发送结果
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SendTestEmailResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "422":
          $ref: '#/components/responses/PreconditionFailed'
          description: "前置条件不满足（SMTP 未配置 / 无启用收件人 / 无凭据）"

# ── Tag 分组（Swagger UI 显示顺序）──────────────────────────────────────────
tags:
  - { name: Health,         description: "健康检查（K8s liveness/readiness probe）" }
  - { name: Auth,           description: "认证与授权" }
  - { name: Instances,      description: "计算实例（VM/Container/GPU/Sandbox/BM/K8s集群）" }
  - { name: Networks,       description: "VPC/子网/安全组/负载均衡/路由" }
  - { name: Volumes,        description: "块存储卷与快照" }
