    # ── 邮件通知（BOSS 平台级 SMTP 发信通道、收件人、事件订阅、测试发送）──────────────
    EmailSmtpConfigResponse:
      type: object
      description: "SMTP 发信通道配置响应；password / auth_code 明文永不回显"
      required: [configured]
      properties:
        configured:
          type: boolean
          description: "是否已配置（false = 空态，其他字段可省略）"
        smtp_host:    { type: string }
        smtp_port:    { type: integer, minimum: 1, maximum: 65535 }
        encryption:   { type: string, enum: [none, starttls, ssl] }
        from_address: { type: string, format: email }
        username:     { type: string }
        has_password:
          type: boolean
          description: "是否已设置 SMTP 登录密码（明文不回显）"
        has_auth_code:
          type: boolean
          description: "是否已设置 SMTP 授权码（明文不回显）；与 password 独立保存，不互斥"
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }

    PutEmailSmtpConfigRequest:
      type: object
      description: "保存 SMTP 发信通道配置；password 与 auth_code 独立保存、独立清除，服务端不强制二选一"
      required: [smtp_host, smtp_port, encryption, from_address, username]
      properties:
        smtp_host:    { type: string, minLength: 1 }
        smtp_port:    { type: integer, minimum: 1, maximum: 65535 }
        encryption:   { type: string, enum: [none, starttls, ssl] }
        from_address: { type: string, format: email }
        username:     { type: string }
        password:
          type: string
          format: password
          description: |
            SMTP 登录密码（企业邮箱场景）。
            - 省略或 null：不修改已有密码
            - 空字符串 ""：清除已有密码
            - 非空字符串：加密后覆盖
            明文永不回显；与 auth_code 独立保存，不互斥。
        auth_code:
          type: string
          format: password
          description: |
            SMTP 授权码（QQ/163/Gmail 等国内邮箱服务商 SMTP 授权登录）。
            - 省略或 null：不修改已有授权码
            - 空字符串 ""：清除已有授权码
            - 非空字符串：加密后覆盖
            明文永不回显；与 password 独立保存，不互斥。
            发送邮件时若 auth_code 已设置则优先使用 auth_code，否则使用 password。
      additionalProperties: false

    EmailRecipient:
      type: object
      description: "邮件收件人"
      required: [id, email, enabled, created_at, updated_at]
      properties:
        id:         { type: string, format: uuid }
