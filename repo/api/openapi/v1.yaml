      description: 删除指定镜像 tag；若该 tag 被容器或 GPU 容器实例引用，返回 409；若该 tag 是 artifact 的最后引用，底层 provider 可同时清理对应 artifact。
      tags: [Registry]
      x-ani-rbac-scope: "scope:registry:write"
      parameters:
        - { name: project, in: path, required: true, schema: { type: string } }
        - { name: repository, in: path, required: true, schema: { type: string } }
        - { name: tag, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: 镜像 Tag 已删除
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RegistryDeletedTag' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
