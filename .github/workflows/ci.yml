name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  GO_VERSION: "1.23"
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:

  # ── Go 服务 CI ──────────────────────────────────────────────────────────────
  go-ci:
    name: Go Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: repo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            repo/go.work.sum
            repo/pkg/go.sum
            repo/services/*/go.sum

      - name: Install tools
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b $(go env GOPATH)/bin v1.59.0

      - name: Build all Go services
        run: make build

      - name: Run tests
        run: make test-go

      - name: Security scan (gosec)
        run: gosec -severity high -quiet ./services/... ./operators/...

      - name: Lint (golangci-lint)
        run: golangci-lint run ./...

      - name: Coverage report
        run: |
          go test ./services/... ./operators/... \
            -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out | tail -1

  # ── Python AI 层 CI ─────────────────────────────────────────────────────────
  python-ci:
    name: Python AI Services
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: repo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: repo/ai/rag-engine/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r ai/rag-engine/requirements.txt
          pip install ruff mypy pytest pytest-asyncio
          pip check

      - name: Lint
        run: |
          ruff check ai/
          mypy ai/ --ignore-missing-imports

      - name: Test
        run: pytest ai/ -v --tb=short

  # ── 前端 CI ─────────────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: repo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: repo/frontends/console/package-lock.json

      - name: Install dependencies
        run: npm --prefix frontends/console ci

      - name: Type check
        run: npm --prefix frontends/console run type-check

      - name: Lint
        run: npm --prefix frontends/console run lint

      - name: Build
        run: npm --prefix frontends/console run build

  # ── Services PR 门禁 ────────────────────────────────────────────────────────
  services-pr-gate:
    name: Services Boundary / API / Docs Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: repo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            repo/go.work.sum
            repo/pkg/go.sum
            repo/services/*/go.sum

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: repo/ci/requirements-contract.txt

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: repo/frontends/console/package-lock.json

      - name: Install Python gate dependencies
        run: |
          pip install -r ci/requirements-contract.txt

      - name: Run Services PR gate
        run: make validate-services

      - name: Validate document entrypoints
        run: make validate-doc-entrypoints

  # ── 依赖 CVE 扫描 ────────────────────────────────────────────────────────────
  dependency-scan:
    name: Dependency CVE Scan
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: repo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            repo/go.work.sum
            repo/pkg/go.sum
            repo/services/*/go.sum

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: repo/ai/rag-engine/requirements.txt

      - name: Scan Go dependencies (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          for module in cli/ani pkg services/ani-gateway services/auth-service services/model-service services/reconcile-worker services/task-service tools/kms-sm4-live-fixture; do
            echo "→ govulncheck $module"
            (cd "$module" && govulncheck ./...)
          done

      - name: Scan Python dependencies
        run: |
          pip install pip-audit
          pip-audit -r ai/rag-engine/requirements.txt

  # ── OpenAPI Spec 校验 ────────────────────────────────────────────────────────
  api-spec-lint:
    name: OpenAPI Spec Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: repo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: repo/ci/requirements-contract.txt

      - name: Install OpenAPI validator
        run: pip install -r ci/requirements-contract.txt

      - name: Lint Core and Services OpenAPI specs
        run: python scripts/validate_openapi_spec.py

  required-gates:
    name: Required PR Gates
    if: ${{ always() }}
    needs:
      - go-ci
      - python-ci
      - frontend-ci
      - services-pr-gate
      - dependency-scan
      - api-spec-lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail closed unless every required job passed
        env:
          GO_RESULT: ${{ needs.go-ci.result }}
          PYTHON_RESULT: ${{ needs.python-ci.result }}
          FRONTEND_RESULT: ${{ needs.frontend-ci.result }}
          SERVICES_RESULT: ${{ needs.services-pr-gate.result }}
          DEPENDENCY_RESULT: ${{ needs.dependency-scan.result }}
          OPENAPI_RESULT: ${{ needs.api-spec-lint.result }}
        run: |
          set -euo pipefail
          for result in "$GO_RESULT" "$PYTHON_RESULT" "$FRONTEND_RESULT" "$SERVICES_RESULT" "$DEPENDENCY_RESULT" "$OPENAPI_RESULT"; do
            test "$result" = success || {
              echo "Required PR Gates blocked by job result: $result"
              exit 1
            }
          done
          echo "All required PR jobs passed."
